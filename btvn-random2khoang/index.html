<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = prompt("nhập khoảng a: ");
        let b = prompt("nhập khoảng b: ");
        a=parseFloat(a);
        b=parseFloat(b);
        let c=undefined;
        if(a<b)
         c = Math.random()*(b-a)+a;
        else if (a=b) c=a;
        else c= Math.random()*(a-b)+b;

        console.log(c.toFixed(2));

    </script>
</body>
</html>
