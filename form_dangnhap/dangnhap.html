<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="dangnhap.css">
    
</head>

<body>
    <form>
        <div class="form_div">
        <div class="dangnhap_div">
            <label class="label_dangnhap">Đăng nhập</label>
        </div>
        <div >
            <label class="label_group">Tên đăng nhập</label><br>
            <input type="text" name="tendangnhap" class="input_group" id="tendangnhap" placeholder="--Nhập tên đăng nhập--"><br>           
        </div>
        <div >
            <label class="label_group">Mật khẩu</label><br>
            <input type="password" name="matkhau" class="input_group" id="password" placeholder="--Nhập mật khẩu--"><br>
        </div>
        <div>
            <button type="submit" onclick="dangnhap" class="btn" id="loginbtn">
                Đăng nhập
            </button>
        </div>
        <a href="#" class="forgot-password">Quên mật khẩu?</a>
        </div>
    </form>
    <script src="dangnhap.js"></script>
</body>
</html>
