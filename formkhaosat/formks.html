<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHẢO SÁT BUỔI HỌC</title>
</head>
<body>
    
    <h1>KHẢO SÁT BUỔI HỌC</h1>
    <table >
        <tr >
            <fielset>
                <legend style ="font-weight: bold;">Họ tên </legend>
                <input type="text" placeholder="Nhập họ tên của bạn" >
            </fielset>
        </tr>
        <tr>
            <fielset>
                <legend style ="font-weight: bold;">Email</legend>
                <input type="email" placeholder="Nhập email của bạn">
            </fielset>
        </tr>
        <tr>
            <fielset>
                <legend style ="font-weight: bold;">Đánh giá về buổi học</legend>
                <input type="number" placeholder="Đánh giá (1-5)" min="1" max="5">
                <span>SAO</span>
            </fielset>
        </tr>
        <tr>
            <fielset>
                <legend style ="font-weight: bold;">Ý kiến đóng góp</legend>
                <input type="text" placeholder="Ý kiến đóng góp">
            </fielset>
        </tr>
    </table>
</body>
</html>
